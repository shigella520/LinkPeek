services:
  linkpeek:
    build: .
    ports:
      - "8080:8080"
    environment:
      BASE_URL: https://preview.example.com
      CACHE_DIR: /data/cache
      STATS_DB_PATH: /data/stats/linkpeek.db
      CACHE_TTL_SECONDS: 86400
      CACHE_MAX_SIZE_GB: 10
      STATS_RETENTION_DAYS: 180
      DOWNLOAD_TIMEOUT: 120s
      VIDEO_MAX_QUALITY: 480
      LOG_LEVEL: INFO
    volumes:
      - ./data:/data
    restart: unless-stopped
