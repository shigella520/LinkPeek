name: Publish Dev Image

run-name: Publish dev image from ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shigella520/linkpeek

concurrency:
  group: publish-dev-image
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure selected ref is dev
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/dev" ]; then
            echo "This workflow only publishes the dev image. Please run it against the dev branch."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify
        run: ./mvnw -B verify

  docker:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - name: Ensure selected ref is dev
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/dev" ]; then
            echo "This workflow only publishes the dev image. Please run it against the dev branch."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=dev

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
